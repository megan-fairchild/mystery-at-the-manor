<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mystery at the Manor</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .invite-hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      text-align: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .invite-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
    }

    .invite-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(26, 26, 46, 0) 0%,
        rgba(26, 26, 46, 0.1) 40%,
        rgba(26, 26, 46, 0.7) 70%,
        rgba(26, 26, 46, 0.95) 90%
      );
      z-index: 1;
    }

    .invite-content {
      position: relative;
      z-index: 2;
      padding-bottom: 3rem;
    }

    .invite-content h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      color: var(--accent);
      text-shadow: 0 2px 30px rgba(212, 160, 23, 0.5), 0 0 60px rgba(0,0,0,0.8);
      margin-bottom: 0.5rem;
    }

    .invite-content .invite-tagline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--text);
      font-style: italic;
      margin-bottom: 1.5rem;
      text-shadow: 0 1px 10px rgba(0,0,0,0.8);
    }

    .invite-content .invite-details {
      font-size: 1.1rem;
      color: var(--text-muted);
      line-height: 2;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }

    .invite-content .invite-details strong {
      color: var(--text);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .invite-content > * {
      animation: fadeUp 0.8s ease-out both;
    }
    .invite-content > *:nth-child(2) { animation-delay: 0.2s; }
    .invite-content > *:nth-child(3) { animation-delay: 0.4s; }
    .invite-content > *:nth-child(4) { animation-delay: 0.6s; }
  </style>
</head>
<body>
  <div class="invite-hero">
    <img src="assets/invitation-hero.png" alt="A mysterious Victorian manor at twilight with colorful silhouettes of dinner party guests visible through illuminated windows" class="invite-bg">
    <div class="invite-overlay"></div>
    <div class="invite-content">
      <h1>Mystery at the Manor</h1>
      <p class="invite-tagline">You are cordially summoned to an evening of intrigue, suspects, and cinema.</p>
      <div class="invite-details">
        <p><strong>Saturday, August 22nd, 2026</strong></p>
        <p>Doors open at 6:00 PM</p>
        <p>Snohomish, WA</p>
        <p style="margin-top:1.5rem; font-size:0.95rem; color:var(--text-muted);">
          Dress code: Suspect chic encouraged.<br>
          Pick your character color and come ready to investigate.
        </p>
      </div>
      <a href="event-hub.html" class="invite-cta">Enter the Manor</a>
    </div>
  </div>
</body>
</html>
